<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>부동산 실거래가 (관리자)</title>

  <!-- Google Fonts: Pretendard -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="filter-section" style="display: flex; align-items: center; gap: 8px; width: 100%;">
        <select id="apt-selector" class="premium-select" style="flex: 1;">
          <option value="">데이터 로딩 중...</option>
        </select>
        <select id="area-selector" class="premium-select" style="flex: 1;">
          <option value="all">전체</option>
        </select>
        <button id="toggle-view-btn" class="icon-btn" title="접속 로그 조회"
          style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s ease;">
          <!-- 로그 조회 아이콘 -->
          <svg id="icon-log" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f1f5f9" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <!-- 실거래가 조회(홈) 아이콘 -->
          <svg id="icon-realestate" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f1f5f9"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </button>
      </div>
    </header>

    <main>

      <!-- 실거래가 뷰 -->
      <div id="view-realestate" style="display: block;">
        <div id="realestate-loading-spinner" class="spinner-container">
          <div class="spinner"></div>
          <p>데이터를 불러오는 중입니다...</p>
        </div>
        <div id="realestate-data-container" class="data-list hidden"></div>
      </div>

      <!-- 접속 로그 뷰 -->
      <div id="view-log" style="display: none;">
        <div id="log-loading-spinner" class="spinner-container hidden">
          <div class="spinner"></div>
          <p>로그 데이터를 불러오는 중입니다...</p>
        </div>
        <div id="log-container" class="data-list hidden"></div>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/realestate.js"></script>
  <script src="js/log_viewer.js"></script>
</body>

</html>
