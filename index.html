<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>부동산 실거래가 조회</title>

  <!-- Google Fonts: Pretendard -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="filter-section">
        <select id="apt-selector" class="premium-select">
          <option value="">데이터 로딩 중...</option>
        </select>
        <select id="area-selector" class="premium-select">
          <option value="all">전체</option>
        </select>
      </div>
    </header>

    <main>

      <!-- 로딩 상태 표시 -->
      <div id="loading-spinner" class="spinner-container">
        <div class="spinner"></div>
        <p>데이터를 불러오는 중입니다...</p>
      </div>

      <!-- 데이터 렌더링 영역 -->
      <div id="data-container" class="data-list hidden">
        <!-- Javascript를 통해 데이터 카드가 여기에 주입됩니다 -->
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
