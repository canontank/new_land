<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>접속 로그 대시보드</title>

  <!-- Google Fonts: Pretendard -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app-container">
    <header class="glass-header">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <h1 style="font-size: 1.25rem; font-weight: 600; margin: 0; color: #f8fafc;">접속 로그 관리</h1>
        <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">실거래가 보기</a>
      </div>
    </header>

    <main>
      <div id="loading-spinner" class="spinner-container">
        <div class="spinner"></div>
        <p>로그 데이터를 불러오는 중입니다...</p>
      </div>

      <div id="log-container" class="data-list hidden">
        <!-- Javascript를 통해 로그 카드가 여기에 주입됩니다 -->
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/log.js"></script>
</body>

</html>
